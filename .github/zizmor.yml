---
# https://docs.zizmor.sh/configuration/
rules:
  unpinned-uses:
    config:
      policies:
        # GitHub-published actions — high-trust publisher, tag pins acceptable.
        actions/*: ref-pin
        github/*: ref-pin
        # Own org — trusted, tag pins acceptable.
        donaldgifford/*: ref-pin
        # Everything else (third-party) must be pinned to a commit SHA.
        "*": hash-pin

  github-env:
    # action.yml writes a fixed-string install_dir (under $HOME) to $GITHUB_PATH
    # in the download step. The value is not derived from any untrusted input;
    # INPUT_VERSION flows into the URL but never into the GITHUB_PATH write.
    ignore:
      - action.yml

  artipacked:
    # changelog-regen.yml pushes CHANGELOG.md to main using the bot's
    # GITHUB_TOKEN, so persist-credentials must stay true. The workflow
    # publishes no artifacts, so the persisted token is never exposed.
    ignore:
      - changelog-regen.yml
