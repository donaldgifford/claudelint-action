---
# $schema=https://www.schemastore.org/github-action.json
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    outputs:
      tag: ${{ steps.bump.outputs.version }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jefflinse/pr-semver-bump@5fb1574ea5a39c96fb4b7bf06490eeac20e1997b # v1.7.4
        id: bump
        name: Bump and Tag Version
        with:
          mode: bump
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          require-release-notes: false
          major-label: major
          minor-label: minor
          patch-label: patch
          noop-labels: "dont-release"
          release-notes-prefix: "### RELEASE NOTES"
          with-v: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: bump-version
    if: needs.bump-version.outputs.skipped != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Set up mise (for git-cliff)
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          experimental: true
          # Disable the tool cache in this release job — zizmor flags
          # cached-tools-then-publish as a cache-poisoning vector.
          cache: false

      - name: Generate release notes
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Move major-version tag
        env:
          TAG: ${{ needs.bump-version.outputs.tag }}
        run: |
          set -euo pipefail
          major="${TAG%%.*}"  # v1.2.3 -> v1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${major}" "${TAG}"
          git push origin "${major}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          body_path: RELEASE_NOTES.md
