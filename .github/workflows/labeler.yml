---
# $schema=https://www.schemastore.org/github-action.json
name: Labeler

# pull_request_target runs against the base branch's workflow code with a
# write-scoped token, so the labeler can apply labels on fork PRs. Keep this
# job isolated and do NOT check out PR code here — that would be an RCE
# vector against a privileged token.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6
